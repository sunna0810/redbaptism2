<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>붉은 세례: 침묵의 방주</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;900&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   붉은 세례: 침묵의 방주  ·  Single-file Web Game
   ========================================================================= */

:root{
  --bg:#06060a;
  --ink:#e8e2d4;
  --ink-dim:#8b8478;
  --blood:#c8102e;
  --blood-deep:#7a0a1e;
  --blood-bright:#ff2a45;
  --gold:#c6a967;
  --bone:#d8d0bc;
  --cold:#cfe3f0;
  --grid:#1a1a22;
  --serif:'Noto Serif KR',serif;
  --sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:var(--sans);
  background:#000;
  color:var(--ink);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  user-select:none;
}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font-family:inherit;color:inherit}

#app{position:fixed;inset:0;background:#000;overflow:hidden}

/* ---------- ATMOSPHERIC OVERLAYS ---------- */
.grain{
  position:absolute;inset:0;pointer-events:none;z-index:1000;
  opacity:.08;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.8'/></svg>");
}
.scanlines{
  position:absolute;inset:0;pointer-events:none;z-index:1001;
  opacity:.05;
  background:repeating-linear-gradient(0deg,#000 0,#000 1px,transparent 1px,transparent 3px);
}
.vignette{
  position:absolute;inset:0;pointer-events:none;z-index:1002;
  box-shadow:inset 0 0 220px 60px rgba(0,0,0,.85);
}

/* ---------- TITLE SCREEN ---------- */
.title-screen{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,#1a0306 0%,#000 70%);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:40px 20px;
  animation:titleFade 1.4s ease;
}
@keyframes titleFade{from{opacity:0}to{opacity:1}}

.title-screen .stamp{
  font-family:var(--mono);font-size:11px;letter-spacing:.4em;
  color:var(--blood);opacity:.75;margin-bottom:32px;
}
.title-screen h1{
  font-family:var(--serif);font-weight:900;
  font-size:clamp(46px,8vw,108px);line-height:.95;
  color:var(--bone);
  text-shadow:0 0 30px rgba(200,16,46,.4);
  margin-bottom:8px;letter-spacing:-.02em;
}
.title-screen h1 .ark{
  display:block;color:var(--blood-bright);font-size:.55em;
  font-weight:600;letter-spacing:.08em;margin-top:14px;opacity:.92;
}
.title-screen .latin{
  font-family:var(--mono);font-size:13px;color:var(--gold);
  letter-spacing:.3em;margin-top:18px;opacity:.7;
}
.title-screen .tag{
  font-family:var(--serif);font-style:italic;
  color:var(--ink-dim);max-width:520px;line-height:1.7;
  margin:40px 0 50px;font-size:15px;
}
.title-screen .tag::before,.title-screen .tag::after{content:'"';color:var(--blood);margin:0 6px}

.btn-line{
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.btn-primary{
  font-family:var(--serif);font-size:18px;font-weight:600;
  padding:16px 56px;letter-spacing:.15em;
  background:transparent;color:var(--bone);
  border:1px solid var(--bone);
  transition:all .3s;position:relative;
}
.btn-primary:hover{
  background:var(--blood);color:#fff;border-color:var(--blood);
  letter-spacing:.22em;
}
.btn-secondary{
  font-family:var(--mono);font-size:12px;
  color:var(--ink-dim);text-decoration:underline;text-decoration-color:transparent;
  padding:8px 16px;letter-spacing:.1em;
  transition:color .25s, text-decoration-color .25s;
}
.btn-secondary:hover{color:var(--gold);text-decoration-color:var(--gold)}
.title-credits{
  position:absolute;bottom:22px;left:0;right:0;
  font-family:var(--mono);font-size:10px;color:#3a3a40;
  letter-spacing:.25em;text-align:center;
}

/* blood drip */
.title-blood{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:2px;height:60vh;
  background:linear-gradient(180deg,transparent 0%,var(--blood) 20%,var(--blood-deep) 100%);
  opacity:.4;
  animation:bleed 4s ease-out infinite alternate;
}
@keyframes bleed{from{height:55vh;opacity:.3}to{height:65vh;opacity:.6}}

/* ---------- API KEY MODAL ---------- */
.modal{
  position:absolute;inset:0;background:rgba(0,0,0,.85);
  display:flex;justify-content:center;align-items:center;z-index:500;
  animation:fadeIn .3s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:#0d0d12;border:1px solid #2a2a36;
  padding:36px 32px;width:92%;max-width:460px;
}
.modal-box h2{
  font-family:var(--serif);font-size:22px;margin-bottom:10px;color:var(--bone);
}
.modal-box p{
  font-size:13px;color:var(--ink-dim);line-height:1.7;margin-bottom:20px;
}
.modal-box .small{font-size:11px;color:#5a5a66;margin-top:14px;line-height:1.6}
.modal-box input{
  width:100%;background:#06060a;border:1px solid #2a2a36;
  padding:12px 14px;font-family:var(--mono);font-size:13px;
  color:var(--cold);outline:none;
}
.modal-box input:focus{border-color:var(--gold)}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.modal-actions button{
  font-family:var(--mono);font-size:12px;padding:10px 18px;
  letter-spacing:.12em;border:1px solid #3a3a48;
  transition:all .2s;
}
.modal-actions button.ok{background:var(--blood);color:#fff;border-color:var(--blood)}
.modal-actions button:hover{background:var(--bone);color:#000;border-color:var(--bone)}
.modal-actions button.ok:hover{background:var(--blood-bright);color:#fff;border-color:var(--blood-bright)}

/* ---------- INTRO / NARRATIVE SCREEN ---------- */
.narrative{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:60px 24px;background:#000;
  text-align:center;
}
.narrative-text{
  font-family:var(--serif);font-size:clamp(15px,2.4vw,22px);
  line-height:2.05;color:var(--ink);max-width:680px;
  white-space:pre-wrap;font-style:italic;
  min-height:240px;
}
.narrative-text .em{color:var(--blood-bright);font-style:normal}
.narrative-text .speaker{
  display:block;font-family:var(--mono);font-size:12px;font-style:normal;
  color:var(--gold);letter-spacing:.2em;margin-bottom:18px;
}
.narrative-next{
  margin-top:50px;font-family:var(--mono);font-size:11px;
  color:var(--ink-dim);letter-spacing:.25em;
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ---------- GAME SCREEN ---------- */
.game-screen{position:absolute;inset:0;display:flex;flex-direction:column}

/* HUD top bar */
.hud-top{
  height:48px;background:rgba(0,0,0,.7);border-bottom:1px solid #1a1a22;
  display:flex;align-items:center;padding:0 18px;gap:24px;
  font-family:var(--mono);font-size:11px;letter-spacing:.15em;
  color:var(--ink-dim);z-index:50;
  flex-shrink:0;
}
.hud-rec{display:flex;align-items:center;gap:8px;color:var(--blood-bright)}
.hud-rec::before{
  content:'';width:9px;height:9px;border-radius:50%;background:var(--blood-bright);
  animation:recblink 1.4s ease-in-out infinite;
}
@keyframes recblink{0%,100%{opacity:1}50%{opacity:.25}}
.hud-zone{color:var(--gold);font-weight:500}
.hud-battery{margin-left:auto;display:flex;align-items:center;gap:10px}
.hud-bat-bar{
  width:80px;height:9px;border:1px solid var(--ink-dim);position:relative;
}
.hud-bat-fill{
  position:absolute;left:0;top:0;bottom:0;
  background:var(--gold);transition:all .4s;
}
.hud-bat-fill.low{background:var(--blood)}
.hud-bat-fill.crit{background:var(--blood-bright);animation:recblink 1s infinite}
.hud-timer{
  color:var(--blood-bright);font-weight:700;font-size:13px;
  letter-spacing:.18em;animation:recblink 1s infinite;
}

/* SCENE area */
.scene{
  flex:1;position:relative;overflow:hidden;
  display:flex;justify-content:center;align-items:center;
  transition:background 1.2s;
}

/* Zone-specific scene background */
.scene-B1{
  background:
    radial-gradient(ellipse at 50% 30%,rgba(200,16,46,.35) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 100%,rgba(122,10,30,.5) 0%,transparent 60%),
    linear-gradient(180deg,#0a0204 0%,#1a0408 50%,#0a0204 100%);
}
.scene-B2{
  background:
    radial-gradient(ellipse at 50% 50%,rgba(80,70,55,.18) 0%,transparent 60%),
    linear-gradient(180deg,#0c0d0a 0%,#15170f 50%,#0c0d0a 100%);
  animation:flicker 5s infinite;
}
@keyframes flicker{
  0%,92%,100%{filter:brightness(1)}
  93%{filter:brightness(.5)}
  94%{filter:brightness(1.1)}
  95%{filter:brightness(.6)}
  96%{filter:brightness(1)}
}
.scene-B3{
  background:
    radial-gradient(ellipse at 50% 50%,rgba(20,5,8,.6) 0%,#000 70%),
    #000;
}
.scene-B4{
  background:
    radial-gradient(ellipse at 50% 30%,rgba(207,227,240,.12) 0%,transparent 50%),
    linear-gradient(180deg,#0a0e12 0%,#10161b 50%,#0a0e12 100%);
}

/* room SVG holder */
.room-art{
  position:absolute;inset:0;display:flex;justify-content:center;align-items:center;
}
.room-art svg{
  width:min(95%,1100px);height:90%;opacity:.55;
}

/* HOTSPOTS */
.hotspot{
  position:absolute;
  width:64px;height:64px;
  display:flex;justify-content:center;align-items:center;
  cursor:pointer;z-index:5;
  transform:translate(-50%,-50%);
}
.hotspot::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:1.5px solid var(--blood-bright);
  animation:hotpulse 2.4s ease-out infinite;
}
.hotspot::after{
  content:'';position:absolute;inset:24px;border-radius:50%;
  background:var(--blood-bright);opacity:.8;
  box-shadow:0 0 16px var(--blood);
}
@keyframes hotpulse{
  0%{transform:scale(.9);opacity:1}
  100%{transform:scale(1.8);opacity:0}
}
.hotspot:hover::after{background:var(--gold);box-shadow:0 0 20px var(--gold)}
.hotspot .lbl{
  position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:10px;letter-spacing:.15em;
  color:var(--bone);background:rgba(0,0,0,.75);
  padding:3px 8px;white-space:nowrap;opacity:0;transition:opacity .2s;
  pointer-events:none;
}
.hotspot:hover .lbl{opacity:1}
.hotspot.done::before{animation:none;border-color:var(--ink-dim);opacity:.4}
.hotspot.done::after{background:var(--ink-dim);box-shadow:none;opacity:.5}
.hotspot.npc::before{border-color:var(--gold)}
.hotspot.npc::after{background:var(--gold);box-shadow:0 0 16px var(--gold)}

/* DIALOG / NARRATIVE BOTTOM PANEL */
.dialog{
  position:absolute;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.95) 30%,#000 100%);
  padding:32px 28px 24px;z-index:40;
  border-top:1px solid #1a1a22;
}
.dialog-speaker{
  font-family:var(--mono);font-size:11px;letter-spacing:.25em;
  color:var(--blood-bright);margin-bottom:10px;text-transform:uppercase;
}
.dialog-speaker.atmos{color:var(--gold)}
.dialog-speaker.system{color:var(--cold)}
.dialog-text{
  font-family:var(--serif);font-size:clamp(15px,1.8vw,18px);
  line-height:1.85;color:var(--ink);max-width:880px;
  margin-bottom:18px;white-space:pre-wrap;
}
.dialog-text.atmosphere{
  font-style:italic;color:var(--bone);
  border-left:2px solid var(--blood);padding-left:16px;
}
.dialog-choices{
  display:flex;flex-direction:column;gap:6px;max-width:880px;
}
.choice{
  text-align:left;font-family:var(--sans);font-size:14px;line-height:1.6;
  padding:10px 14px;
  background:transparent;color:var(--ink);
  border:1px solid #25252e;
  transition:all .2s;
}
.choice:hover{
  background:rgba(200,16,46,.12);border-color:var(--blood);
  color:var(--bone);padding-left:20px;
}
.choice .num{
  font-family:var(--mono);font-size:11px;color:var(--gold);
  margin-right:10px;letter-spacing:.1em;
}
.choice.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.dialog-continue{
  font-family:var(--mono);font-size:11px;color:var(--ink-dim);
  letter-spacing:.25em;animation:pulse 1.6s infinite;
  text-align:left;padding:6px 0;cursor:pointer;
}
.dialog-continue:hover{color:var(--bone)}

/* SIDE PANEL (inventory + actions) */
.side-panel{
  position:absolute;right:14px;top:60px;
  width:200px;z-index:30;
  background:rgba(8,8,12,.65);border:1px solid #1a1a22;
  padding:14px;
  font-family:var(--mono);font-size:11px;
  backdrop-filter:blur(4px);
}
.side-panel h3{
  font-family:var(--mono);font-size:10px;color:var(--gold);
  letter-spacing:.25em;margin-bottom:8px;font-weight:500;
}
.inv-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;min-height:20px}
.inv-item{
  font-size:11px;color:var(--bone);padding:4px 6px;background:#0d0d12;
  border-left:2px solid var(--blood);line-height:1.4;
}
.inv-empty{color:var(--ink-dim);font-style:italic;font-size:11px}
.side-actions button{
  display:block;width:100%;font-family:var(--mono);font-size:11px;
  padding:7px;margin-bottom:4px;border:1px solid #2a2a36;
  color:var(--ink);letter-spacing:.1em;transition:all .2s;
}
.side-actions button:hover{background:var(--blood);color:#fff;border-color:var(--blood)}
.side-actions button:disabled{opacity:.3;cursor:not-allowed}
.side-actions .hint-cost{font-size:9px;color:var(--ink-dim);margin-left:6px}

/* PUZZLE MODAL */
.puzzle{
  position:absolute;inset:0;background:rgba(0,0,0,.92);
  display:flex;justify-content:center;align-items:center;z-index:100;
  animation:fadeIn .3s;padding:20px;
}
.puzzle-box{
  background:#0a0a10;border:1px solid #2a2a36;
  padding:32px 28px;width:92%;max-width:520px;max-height:90vh;overflow-y:auto;
}
.puzzle-title{
  font-family:var(--serif);font-size:22px;color:var(--bone);
  margin-bottom:6px;letter-spacing:-.01em;
}
.puzzle-sub{
  font-family:var(--mono);font-size:11px;color:var(--gold);
  letter-spacing:.18em;margin-bottom:18px;
}
.puzzle-desc{
  font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--ink);
  margin-bottom:22px;font-style:italic;
}
.puzzle-feedback{
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;
  text-align:center;margin-top:14px;min-height:18px;
}
.puzzle-feedback.ok{color:#4adba0}
.puzzle-feedback.no{color:var(--blood-bright)}
.puzzle-actions{
  display:flex;gap:10px;margin-top:18px;justify-content:flex-end;
}
.puzzle-actions button{
  font-family:var(--mono);font-size:12px;padding:10px 22px;
  border:1px solid #3a3a48;letter-spacing:.1em;
}
.puzzle-actions button.ok{background:var(--blood);border-color:var(--blood);color:#fff}
.puzzle-actions button:hover{background:var(--bone);color:#000;border-color:var(--bone)}
.puzzle-actions button.ok:hover{background:var(--blood-bright);border-color:var(--blood-bright);color:#fff}

/* Keypad */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 auto 14px;max-width:240px}
.keypad button{
  font-family:var(--mono);font-size:18px;padding:14px;
  background:#15151c;border:1px solid #2a2a36;color:var(--cold);
  transition:all .15s;
}
.keypad button:hover{background:var(--blood);border-color:var(--blood);color:#fff}
.keypad button.wide{grid-column:span 2}
.keypad-display{
  font-family:var(--mono);font-size:24px;text-align:center;letter-spacing:.4em;
  color:var(--cold);background:#06060a;padding:14px;margin-bottom:14px;
  border:1px solid #2a2a36;min-height:56px;
}
.keypad-toggle{
  display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;
  color:var(--ink);justify-content:center;margin:14px 0;
}
.keypad-toggle button{
  font-family:var(--mono);font-size:11px;padding:6px 14px;
  background:#15151c;border:1px solid #2a2a36;color:var(--cold);
}
.keypad-toggle button.on{background:var(--gold);color:#000;border-color:var(--gold)}

/* Bed grid */
.bed-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px;
  max-height:260px;overflow-y:auto;padding:4px;
}
.bed{
  font-family:var(--mono);font-size:11px;padding:14px 4px;text-align:center;
  background:#15151c;border:1px solid #2a2a36;color:var(--ink);cursor:pointer;
  transition:all .15s;
}
.bed:hover{background:var(--blood);border-color:var(--blood);color:#fff}
.bed.selected{background:var(--gold);color:#000;border-color:var(--gold)}

/* Radio dial */
.radio-dial{
  display:flex;flex-direction:column;align-items:center;margin-bottom:14px;
}
.radio-display{
  font-family:var(--mono);font-size:48px;color:var(--cold);
  background:#06060a;padding:14px 36px;border:1px solid #2a2a36;letter-spacing:.1em;
  margin-bottom:8px;
}
.radio-buzz{
  font-family:var(--mono);font-size:11px;color:var(--ink-dim);
  font-style:italic;margin-bottom:14px;min-height:16px;
}
.radio-controls{display:flex;gap:10px}
.radio-controls button{
  font-family:var(--mono);font-size:14px;padding:10px 22px;
  background:#15151c;border:1px solid #2a2a36;color:var(--cold);
}
.radio-controls button:hover{background:var(--blood);border-color:var(--blood);color:#fff}

/* Compass */
.compass{
  position:relative;width:240px;height:240px;margin:0 auto 14px;
  border:2px solid var(--gold);border-radius:50%;
}
.compass-dir{
  position:absolute;width:40px;height:40px;display:flex;justify-content:center;align-items:center;
  font-family:var(--mono);font-size:16px;color:var(--cold);
  background:#15151c;border:1px solid #2a2a36;border-radius:50%;cursor:pointer;
  transition:all .2s;
}
.compass-dir:hover{background:var(--blood);color:#fff;border-color:var(--blood)}
.compass-dir.N{top:-20px;left:50%;transform:translateX(-50%)}
.compass-dir.S{bottom:-20px;left:50%;transform:translateX(-50%)}
.compass-dir.E{right:-20px;top:50%;transform:translateY(-50%)}
.compass-dir.W{left:-20px;top:50%;transform:translateY(-50%)}
.compass-needle{
  position:absolute;left:50%;top:50%;width:3px;height:90px;
  background:linear-gradient(180deg,var(--blood-bright) 0%,var(--blood-bright) 50%,#444 50%,#444 100%);
  transform:translate(-50%,-50%) rotate(-12deg);transform-origin:center;
  animation:needlewobble 3s ease-in-out infinite;
}
@keyframes needlewobble{
  0%,100%{transform:translate(-50%,-50%) rotate(-12deg)}
  50%{transform:translate(-50%,-50%) rotate(-18deg)}
}

/* Text input puzzle */
.text-puzzle input{
  width:100%;font-family:var(--mono);font-size:18px;
  background:#06060a;border:1px solid #2a2a36;color:var(--cold);
  padding:14px;text-align:center;letter-spacing:.2em;outline:none;
}
.text-puzzle input:focus{border-color:var(--gold)}

/* Memo assembly */
.memo-list{
  display:flex;flex-direction:column;gap:6px;margin-bottom:14px;
}
.memo-piece{
  font-family:var(--mono);font-size:13px;padding:10px 12px;
  background:#15151c;border:1px solid #2a2a36;color:var(--bone);
  letter-spacing:.1em;display:flex;justify-content:space-between;align-items:center;
}
.memo-piece .where{font-size:10px;color:var(--ink-dim)}
.memo-input{
  width:100%;font-family:var(--mono);font-size:18px;
  background:#06060a;border:1px solid #2a2a36;color:var(--cold);
  padding:14px;text-align:center;letter-spacing:.2em;outline:none;margin-top:10px;
}
.memo-input:focus{border-color:var(--gold)}
.memo-warning{
  font-family:var(--mono);font-size:11px;color:var(--blood-bright);
  text-align:center;margin-top:10px;line-height:1.5;
}

/* Visual choice (water fountains) */
.choice-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;
}
.choice-card{
  background:#15151c;border:1px solid #2a2a36;padding:18px 14px;
  cursor:pointer;transition:all .2s;text-align:center;
}
.choice-card:hover{border-color:var(--blood)}
.choice-card .vis{
  width:60px;height:60px;border-radius:50%;margin:0 auto 12px;
}
.choice-card.clear .vis{
  background:radial-gradient(circle,rgba(207,227,240,.6) 0%,rgba(207,227,240,.15) 100%);
  border:1px solid rgba(207,227,240,.3);
}
.choice-card.murky .vis{
  background:radial-gradient(circle,rgba(220,210,190,.85) 0%,rgba(180,170,150,.4) 100%);
  border:1px solid rgba(220,210,190,.4);
}
.choice-card .name{
  font-family:var(--mono);font-size:12px;color:var(--bone);letter-spacing:.1em;
}

/* TIMED CHOICE - chase event */
.timed{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:60}
.timed-bar{
  width:180px;height:4px;background:#1a1a22;overflow:hidden;
}
.timed-bar-fill{
  height:100%;background:var(--blood-bright);
  transition:width 1s linear;
}

/* ENDING SCREEN */
.ending{
  position:absolute;inset:0;background:#000;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:60px 24px;text-align:center;
  animation:endingFade 2.5s ease;overflow-y:auto;
}
@keyframes endingFade{from{opacity:0;filter:blur(8px)}to{opacity:1;filter:blur(0)}}
.ending-title{
  font-family:var(--serif);font-weight:900;font-size:clamp(38px,6vw,72px);
  margin-bottom:12px;letter-spacing:-.02em;
}
.ending-id{
  font-family:var(--mono);font-size:11px;letter-spacing:.4em;
  margin-bottom:36px;opacity:.6;
}
.ending-epilogue{
  font-family:var(--serif);font-size:clamp(14px,2vw,17px);line-height:2.1;
  max-width:640px;color:var(--ink);white-space:pre-wrap;
  margin-bottom:50px;
}
.ending-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.ending-actions button{
  font-family:var(--mono);font-size:12px;padding:12px 26px;letter-spacing:.15em;
  border:1px solid var(--ink);color:var(--ink);transition:all .2s;
}
.ending-actions button:hover{background:var(--ink);color:#000}

.ending.END1{color:#cfe8ff}
.ending.END1 .ending-title{color:#fff;text-shadow:0 0 24px rgba(0,204,255,.4)}
.ending.END2{color:#e8e2d4}
.ending.END3{color:#aaa}
.ending.END3 .ending-title{color:#ddd}
.ending.END4{color:#c9b074}
.ending.END4 .ending-title{color:#e6c890}
.ending.HIDDEN{color:#ff8094}
.ending.HIDDEN .ending-title{color:#ff2a45;text-shadow:0 0 32px rgba(255,42,69,.5)}

/* LOADING */
.loading{
  position:absolute;inset:0;background:#000;display:flex;justify-content:center;align-items:center;
  z-index:9999;font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--blood);
}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#0a0a10}
::-webkit-scrollbar-thumb{background:#2a2a36}
::-webkit-scrollbar-thumb:hover{background:var(--blood)}

/* SMALL SCREEN */
@media(max-width:640px){
  .side-panel{display:none}
  .hotspot{width:54px;height:54px}
  .dialog{padding:24px 18px 18px}
  .puzzle-box{padding:24px 18px}
  .hud-top{font-size:10px;gap:14px;padding:0 12px}
  .hud-bat-bar{width:50px}
}
</style>

/* ===========================================================================
   PART C · GEMINI API (optional)
   =========================================================================== */

const Gemini = {
  async generate(systemPrompt, userMessage){
    if(!State.geminiKey) return null;
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${State.geminiKey}`;
    try{
      const res = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          systemInstruction:{parts:[{text:systemPrompt}]},
          contents:[{role:'user',parts:[{text:userMessage}]}],
          generationConfig:{maxOutputTokens:200, temperature:0.85, topP:.9},
        }),
      });
      const data = await res.json();
      return data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || null;
    }catch(e){
      console.warn('Gemini error:', e);
      return null;
    }
  },
};

function startGame(){
  State.screen='intro';
  State.introIndex=0;
  renderIntro();
}

function renderIntro(){
  const lines = GAME_DATA.monologues.INTRO;
  const line = lines[State.introIndex];
  clearRoot();
  const div = document.createElement('div');
  div.className = 'narrative';
  div.innerHTML = `
    <div class="narrative-text">
      <span class="speaker">${line.speaker}</span>
      ${line.text.replace(/\n/g,'<br>')}
    </div>
    <div class="narrative-next">▶  ${State.introIndex < lines.length-1 ? '계속' : '입장'}  ◀</div>
  `;
  root().appendChild(div);
  div.onclick = ()=>{
    State.introIndex++;
    if(State.introIndex >= lines.length){
      enterRoom('B1');
    }else{
      renderIntro();
    }
  };
}

function enterRoom(roomId, skipMono){
  State.room = roomId;
  State.screen = 'game';
  if(!skipMono && GAME_DATA.monologues[roomId]){
    showMonologue(GAME_DATA.monologues[roomId], ()=>renderGame());
    return;
  }
  renderGame();
}

function showMonologue(lines, onDone){
  let i=0;
  const show = ()=>{
    if(i>=lines.length){ onDone(); return; }
    const line = lines[i];
    clearRoot();
    const div = document.createElement('div');
    div.className = 'narrative';
    div.innerHTML = `
      <div class="narrative-text">
        <span class="speaker">${line.speaker}</span>
        ${line.text.replace(/\n/g,'<br>')}
      </div>
      <div class="narrative-next">▶  계속  ◀</div>
    `;
    root().appendChild(div);
    div.onclick = ()=>{ i++; show(); };
  };
  show();
}

function showAtmosphere(text){
  // Queue an atmosphere overlay on top of game
  const overlay = document.createElement('div');
  overlay.className = 'narrative';
  overlay.style.background='rgba(0,0,0,.95)';
  overlay.style.zIndex='200';
  overlay.innerHTML = `
    <div class="narrative-text">
      <span class="speaker">상황</span>
      ${text.replace(/\n/g,'<br>')}
    </div>
    <div class="narrative-next">▶  계속  ◀</div>
  `;
  document.getElementById('app').appendChild(overlay);
  overlay.onclick = ()=>overlay.remove();
}

function renderGame(){
  if(State.screen !== 'game') return;
  const room = GAME_DATA.rooms[State.room];
  clearRoot();

  const wrap = document.createElement('div');
  wrap.className='game-screen';
  wrap.innerHTML = `
    ${renderHUD()}
    <div class="scene scene-${State.room}" id="scene">
      <div class="room-art">${getRoomArt(State.room)}</div>
      ${room.hotspots.map(h=>renderHotspot(h)).join('')}
      ${renderSidePanel()}
      ${renderAtmosphereDialog(room.atmosphere)}
    </div>
  `;
  root().appendChild(wrap);

  // hotspot listeners
  room.hotspots.forEach(h=>{
    const el = document.getElementById('hs-'+h.id);
    if(el) el.onclick = ()=>onHotspotClick(h);
  });
  document.getElementById('btn-hint')?.addEventListener('click', requestHint);
  document.getElementById('btn-status')?.addEventListener('click', showStatus);
}

function renderHUD(){
  const bat = State.battery;
  const cls = bat<=15?'crit':bat<=30?'low':'';
  let timer = '';
  if(State.flags.timerActive){
    const s = State.flags.timerSeconds;
    const m = Math.floor(s/60), ss = String(s%60).padStart(2,'0');
    timer = `<div class="hud-timer">⚠ ${m}:${ss}</div>`;
  }
  return `
    <div class="hud-top">
      <div class="hud-rec">REC</div>
      <div class="hud-zone">${GAME_DATA.rooms[State.room]?.subtitle || ''}</div>
      ${timer}
      <div class="hud-battery">
        <span>BATTERY ${bat}%</span>
        <div class="hud-bat-bar"><div class="hud-bat-fill ${cls}" style="width:${bat}%"></div></div>
      </div>
    </div>
  `;
}

function renderHotspot(h){
  const done = State.clues.has(h.clue) || State.mq.has(h.puzzle) || State.sq.has(h.puzzle);
  // hide hotspot if its requirements aren't met
  const reqMet = !h.requires || h.requires.every(r=>{
    if(r.endsWith('_DONE')) return State.mq.has(r.replace('_DONE',''));
    return State.clues.has(r) || State.mq.has(r) || State.sq.has(r);
  });
  if(!reqMet) return '';
  const cls = (done?'done ':'') + (h.type==='npc'?'npc':'');
  return `<div class="hotspot ${cls}" id="hs-${h.id}" style="left:${h.x}%;top:${h.y}%">
    <span class="lbl">${h.label}</span>
  </div>`;
}

function renderSidePanel(){
  const inv = State.inventory.length
    ? State.inventory.map(i=>`<div class="inv-item">▸ ${i}</div>`).join('')
    : `<div class="inv-empty">— 비어 있음 —</div>`;
  const hintCost = (State.battery>=10)?'(배터리 -10%)':'(배터리 부족)';
  const hintDisabled = State.battery<10 ? 'disabled' : '';
  return `
    <div class="side-panel">
      <h3>인벤토리</h3>
      <div class="inv-list">${inv}</div>
      <h3>액션</h3>
      <div class="side-actions">
        <button id="btn-hint" ${hintDisabled}>힌트 요청<span class="hint-cost">${hintCost}</span></button>
        <button id="btn-status">상태 확인</button>
      </div>
    </div>
  `;
}

function renderAtmosphereDialog(text){
  return `
    <div class="dialog">
      <div class="dialog-speaker atmos">분위기</div>
      <div class="dialog-text atmosphere">${text}</div>
    </div>
  `;
}

/* ===========================================================================
   PART E · HOTSPOT / CLUE / EVENT HANDLERS
   =========================================================================== */

function onHotspotClick(h){
  if(h.type === 'npc' && h.dialog){
    openDialogue(h.dialog);
    return;
  }
  if(h.event){
    triggerEvent(h.event);
    return;
  }
  if(h.puzzle){
    openPuzzle(h.puzzle);
    return;
  }
  if(h.clue){
    discoverClue(h.clue);
    return;
  }
}

function discoverClue(clueId){
  if(State.clues.has(clueId)){
    // re-show
    showClue(clueId);
    return;
  }
  State.clues.add(clueId);
  const clue = GAME_DATA.clues[clueId];
  if(clue.item) State.inventory.push(clue.item);
  if(clue.effect === 'suspicionMaybe') State.suspicion += 1;
  showClue(clueId);
}

function showClue(clueId){
  const clue = GAME_DATA.clues[clueId];
  const overlay = document.createElement('div');
  overlay.className = 'modal';
  overlay.innerHTML = `
    <div class="modal-box">
      <h2 style="font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.25em;margin-bottom:8px;text-transform:uppercase;">단서 발견</h2>
      <p style="font-family:var(--serif);font-size:18px;color:var(--bone);margin-bottom:14px;font-weight:600;">${clue.title}</p>
      <p style="font-family:var(--serif);font-size:15px;line-height:1.8;color:var(--ink);white-space:pre-wrap;font-style:italic;border-left:2px solid var(--blood);padding-left:14px;">${clue.text}</p>
      ${clue.item?`<p style="margin-top:16px;font-family:var(--mono);font-size:12px;color:#4adba0;">+ ${clue.item}</p>`:''}
      <div class="modal-actions"><button class="ok" id="close-clue">확인</button></div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('close-clue').onclick = ()=>{
    overlay.remove();
    renderGame();
  };
}

/* ===========================================================================
   PART F · DIALOGUES
   =========================================================================== */

async function openDialogue(dialogId){
  const dlg = GAME_DATA.dialogues[dialogId];
  if(!dlg) return;
  State.currentDialogue = dialogId;
  renderDialogue(dlg);

  // Try Gemini augmentation for NPC dialogue (optional)
  if(State.geminiKey && dlg.npc){
    const dynamic = await maybeGenerateDynamic(dlg);
    if(dynamic && State.currentDialogue===dialogId){
      const el = document.querySelector('.dialog-text:not(.atmosphere)');
      if(el) el.textContent = dynamic;
    }
  }
}

async function maybeGenerateDynamic(dlg){
  if(!dlg.npc) return null;
  const prompts = {
    NOYUNA: `당신은 노윤아입니다. 전직 기자, 현재 교주의 첩자. 딸의 안전을 위해 3년 전 포섭됨. 불안하고 죄책감 있음. 한국어, 60자 이내.`,
    BOSS: `당신은 교주 박규빈입니다. 전직 정관계 로비스트. 자신을 실험자라고 생각함. 항상 차분하고 합리적. 한국어, 80자 이내.`,
    KIM: `당신은 편집장 김재원입니다. 냉정하고 건조함. 무전기 품질로 끊김. 한국어, 40자 이내.`,
  };
  const sys = prompts[dlg.npc];
  if(!sys) return null;
  const ctx = `현재 구역: ${State.room}, 신뢰도: ${State.trust}, 의심: ${State.suspicion}. 원본 대사: "${dlg.text}". 같은 의미·톤을 유지하며 같은 정보를 전달하되 자연스럽게 다시 써 주세요.`;
  return await Gemini.generate(sys, ctx);
}

function renderDialogue(dlg){
  clearRoot();
  const wrap = document.createElement('div');
  wrap.className='game-screen';
  wrap.innerHTML = `
    ${renderHUD()}
    <div class="scene scene-${State.room}">
      <div class="room-art">${getRoomArt(State.room)}</div>
      <div class="dialog">
        <div class="dialog-speaker">${dlg.speaker}</div>
        <div class="dialog-text">${dlg.text.replace(/\n/g,'<br>')}</div>
        <div class="dialog-choices">
          ${dlg.choices.map((c,i)=>{
            const disabled = c.requires && !checkRequires(c.requires);
            return `<button class="choice ${disabled?'disabled':''}" data-idx="${i}">
              <span class="num">${String(i+1).padStart(2,'0')}</span>${c.text}${disabled?` <span style="opacity:.5;font-size:11px;">${c.requiresMsg||''}</span>`:''}
            </button>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
  root().appendChild(wrap);
  document.querySelectorAll('.choice:not(.disabled)').forEach(btn=>{
    btn.onclick = ()=>handleChoice(dlg, parseInt(btn.dataset.idx));
  });
}

function checkRequires(req){
  if(req.sq && !State.sq.has(req.sq)) return false;
  if(req.mq && !State.mq.has(req.mq)) return false;
  if(req.flag && !State.flags[req.flag]) return false;
  return true;
}

function handleChoice(dlg, idx){
  const choice = dlg.choices[idx];
  applyEffect(choice.effect);
  if(choice.next){
    if(choice.next.startsWith('__DLG__')){
      openDialogue(choice.next.replace('__DLG__',''));
    }else if(choice.next.startsWith('__PUZZLE__')){
      openPuzzle(choice.next.replace('__PUZZLE__',''));
    }else{
      openDialogue(choice.next);
    }
  }else{
    State.currentDialogue=null;
    afterDialogueOrEvent();
  }
}

function applyEffect(eff){
  if(!eff) return;
  if(eff.trust) State.trust += eff.trust;
  if(eff.aggression) State.aggression += eff.aggression;
  if(eff.suspicion) State.suspicion += eff.suspicion;
  if(eff.battery) State.battery = Math.max(0, Math.min(100, State.battery + eff.battery));
  if(eff.flag) State.flags[eff.flag] = true;
}

function afterDialogueOrEvent(){
  // If we just finished a betrayal dialog tree, enter B4
  if(State.room==='B3' && State.mq.has('MQ3') && !State.flags.B4entered){
    State.flags.B4entered = true;
    enterRoom('B4');
    return;
  }
  // Resume the game in the current room
  renderGame();
}

/* ===========================================================================
   PART G · EVENTS
   =========================================================================== */

function triggerEvent(eventId){
  const evt = GAME_DATA.events[eventId];
  if(!evt) return;
  State.currentEvent = eventId;
  if(evt.onTrigger) evt.onTrigger(State);
  renderEvent(evt);
}

function renderEvent(evt){
  clearRoot();
  const wrap = document.createElement('div');
  wrap.className='game-screen';
  wrap.innerHTML = `
    ${renderHUD()}
    <div class="scene scene-${State.room}">
      <div class="room-art">${getRoomArt(State.room)}</div>
      ${evt.timed?`<div class="timed"><div class="timed-bar"><div class="timed-bar-fill" id="timed-fill" style="width:100%"></div></div></div>`:''}
      <div class="dialog">
        <div class="dialog-speaker atmos">상황</div>
        <div class="dialog-text atmosphere">${evt.atmosphere}</div>
        ${evt.text?`<div class="dialog-speaker" style="margin-top:14px">${evt.speaker||''}</div><div class="dialog-text">${evt.text.replace(/\n/g,'<br>')}</div>`:''}
        <div class="dialog-choices">
          ${evt.choices.map((c,i)=>`<button class="choice" data-idx="${i}">
            <span class="num">${String(i+1).padStart(2,'0')}</span>${c.text}
          </button>`).join('')}
        </div>
      </div>
    </div>
  `;
  root().appendChild(wrap);
  document.querySelectorAll('.choice').forEach(b=>{
    b.onclick = ()=>handleEventChoice(evt, parseInt(b.dataset.idx));
  });

  // timed event ticker
  if(evt.timed){
    let t = evt.timed;
    const fill = document.getElementById('timed-fill');
    const id = setInterval(()=>{
      t -= .1;
      if(fill) fill.style.width = Math.max(0,(t/evt.timed)*100)+'%';
      if(t<=0){
        clearInterval(id);
        // default: pick option 3 (hide) on timeout
        if(State.currentEvent){
          handleEventChoice(evt, evt.choices.length-1);
        }
      }
    },100);
    evt._intervalId = id;
  }
}

function handleEventChoice(evt, idx){
  if(evt._intervalId) clearInterval(evt._intervalId);
  const choice = evt.choices[idx];
  applyEffect(choice.effect);
  State.currentEvent = null;

  if(choice.next){
    if(choice.next.startsWith('__DLG__')){
      openDialogue(choice.next.replace('__DLG__',''));
      return;
    }
    if(choice.next.startsWith('__PUZZLE__')){
      openPuzzle(choice.next.replace('__PUZZLE__',''));
      return;
    }
  }

  // Specific event flow
  if(State.currentEvent===null){
    // After chasing event → move to B3
    if(evt === GAME_DATA.events.EVT_CHASING){
      enterRoom('B3');
      return;
    }
    if(evt === GAME_DATA.events.EVT_BETRAYAL){
      // Check if trust path chosen — if option 1 (dialogue)
      if(idx===0){
        openDialogue('DLG_NY_BETRAYAL');
        return;
      }
      enterRoom('B4');
      return;
    }
    if(evt === GAME_DATA.events.EVT_ESCAPE){
      openPuzzle('MQ5');
      return;
    }
    if(evt === GAME_DATA.events.EVT_JISU_FOUND){
      renderGame();
      return;
    }
  }
  renderGame();
}

/* Trigger pending exit event when leaving a room */
function tryAdvanceRoom(){
  const room = GAME_DATA.rooms[State.room];
  if(!room) return;
  if(room.onExit && !State.flags['exit_'+State.room]){
    State.flags['exit_'+State.room] = true;
    triggerEvent(room.onExit);
    return;
  }
  if(room.nextRoom === 'ENDING'){
    triggerEnding();
    return;
  }
  enterRoom(room.nextRoom);
}

/* ===========================================================================
   PART H · PUZZLES
   =========================================================================== */

function openPuzzle(puzzleId){
  const p = GAME_DATA.puzzles[puzzleId];
  if(!p) return;
  State.currentPuzzle = puzzleId;
  renderPuzzle(p, puzzleId);
}

function renderPuzzle(p, id){
  // overlay over current game screen
  const old = document.querySelector('.puzzle');
  if(old) old.remove();
  if(!document.querySelector('.game-screen')) renderGame();

  const overlay = document.createElement('div');
  overlay.className = 'puzzle';
  let body = '';
  switch(p.type){
    case 'keypadSilent': body = renderKeypadSilent(p); break;
    case 'visualChoice': body = renderVisualChoice(p); break;
    case 'bedGrid': body = renderBedGrid(p); break;
    case 'textInput': body = renderTextInput(p); break;
    case 'radioDial': body = renderRadioDial(p); break;
    case 'memoAssembly': body = renderMemoAssembly(p); break;
    case 'compass': body = renderCompass(p); break;
  }
  overlay.innerHTML = `
    <div class="puzzle-box">
      <div class="puzzle-sub">${p.sub}</div>
      <h2 class="puzzle-title">${p.name}</h2>
      <p class="puzzle-desc">${p.desc.replace(/\n/g,'<br>')}</p>
      ${body}
      ${p.warning?`<p class="memo-warning">⚠ ${p.warning}</p>`:''}
      <div class="puzzle-feedback" id="puz-fb">&nbsp;</div>
      <div class="puzzle-actions">
        <button id="puz-cancel">취소</button>
        ${p.type==='visualChoice'?'':'<button class="ok" id="puz-submit">시도</button>'}
      </div>
    </div>
  `;
  document.getElementById('app').appendChild(overlay);

  document.getElementById('puz-cancel').onclick = ()=>{
    overlay.remove();
    State.currentPuzzle=null;
  };

  attachPuzzleHandlers(p, id, overlay);
}

/* Each puzzle renderer */
function renderKeypadSilent(p){
  return `
    <div class="keypad-display" id="kp-disp"></div>
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-key="${n}">${n}</button>`).join('')}
      <button data-key="clear" style="background:#2a1a1a;color:var(--blood-bright)">×</button>
      <button data-key="0">0</button>
      <button data-key="ok" style="background:#1a2a1a;color:#4adba0">▾</button>
    </div>
    <div class="keypad-toggle">
      <button id="silent-toggle">[ 침묵 모드: OFF ]</button>
      <span style="font-size:10px;color:var(--ink-dim)">— 레버를 당기기 전에</span>
    </div>
  `;
}
function renderVisualChoice(p){
  return `
    <div class="choice-grid">
      ${p.options.map(o=>`
        <div class="choice-card ${o.vis}" data-id="${o.id}">
          <div class="vis"></div>
          <div class="name">${o.label}</div>
        </div>
      `).join('')}
    </div>
  `;
}
function renderBedGrid(p){
  const beds = Array.from({length:48},(_,i)=>i+1);
  return `
    <div class="bed-grid">
      ${beds.map(n=>`<div class="bed" data-bed="${n}">${n}</div>`).join('')}
    </div>
    <div style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--gold)" id="bed-sel">— 선택되지 않음 —</div>
  `;
}
function renderTextInput(p){
  return `<div class="text-puzzle"><input type="text" id="ti-input" placeholder="${p.placeholder||''}" autocomplete="off" spellcheck="false"></div>`;
}
function renderRadioDial(p){
  return `
    <div class="radio-dial">
      <div class="radio-display" id="radio-disp">CH 0</div>
      <div class="radio-buzz" id="radio-buzz">— 잡음 —</div>
      <div class="radio-controls">
        <button data-dir="-1">◀ DOWN</button>
        <button data-dir="+1">UP ▶</button>
      </div>
    </div>
  `;
}
function renderMemoAssembly(p){
  const collected = p.pieces.filter(piece=>State.clues.has('CLU_B4_MEMO'+(p.pieces.indexOf(piece)+1)));
  return `
    <div class="memo-list">
      ${p.pieces.map((piece,i)=>{
        const has = State.clues.has('CLU_B4_MEMO'+(i+1));
        return `<div class="memo-piece" style="${has?'':'opacity:.3'}">
          <span>[${piece.where}] ${has?piece.text:'???'}</span>
          <span class="where">${has?'수집됨':'미수집'}</span>
        </div>`;
      }).join('')}
    </div>
    <input class="memo-input" type="text" id="ti-input" placeholder="조합한 비밀번호" autocomplete="off" spellcheck="false">
  `;
}
function renderCompass(p){
  return `
    <div class="compass">
      <div class="compass-needle"></div>
      <div class="compass-dir N" data-dir="N">N</div>
      <div class="compass-dir E" data-dir="E">E</div>
      <div class="compass-dir S" data-dir="S">S</div>
      <div class="compass-dir W" data-dir="W">W</div>
    </div>
    <div style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink-dim)">— 진북(眞北)을 선택하라 —</div>
  `;
}

/* puzzle interaction wiring */
function attachPuzzleHandlers(p, id, overlay){
  const fb = (txt,ok)=>{
    const el = document.getElementById('puz-fb');
    el.textContent = txt;
    el.className = 'puzzle-feedback ' + (ok?'ok':'no');
  };

  if(p.type==='keypadSilent'){
    let buf='', silent=false;
    const disp = document.getElementById('kp-disp');
    overlay.querySelectorAll('.keypad button').forEach(b=>{
      b.onclick = ()=>{
        const k = b.dataset.key;
        if(k==='clear'){ buf=''; disp.textContent=''; return; }
        if(k==='ok'){ submit(); return; }
        if(buf.length<4){ buf+=k; disp.textContent=buf; }
      };
    });
    document.getElementById('silent-toggle').onclick = (e)=>{
      silent = !silent;
      e.target.textContent = silent?'[ 침묵 모드: ON ]':'[ 침묵 모드: OFF ]';
      e.target.classList.toggle('on', silent);
    };
    const submit = ()=>{
      if(buf!==p.answer.code){ fb('번호가 맞지 않는다.', false); return; }
      if(!silent){ fb('레버가 삐걱거린다. 어디선가 발걸음 소리.', false); State.battery=Math.max(0,State.battery-3); document.querySelector('.hud-bat-fill').style.width=State.battery+'%'; return; }
      fb('— 금고가 침묵 속에서 열린다 —', true);
      setTimeout(()=>solvePuzzle(p, id, overlay), 1200);
    };
    document.getElementById('puz-submit').onclick = submit;
  }

  if(p.type==='visualChoice'){
    overlay.querySelectorAll('.choice-card').forEach(c=>{
      c.onclick = ()=>{
        const opt = p.options.find(o=>o.id===c.dataset.id);
        if(opt.correct){
          fb('성분 분석 완료: 뇌파 억제 화합물 검출.', true);
          setTimeout(()=>solvePuzzle(p, id, overlay), 1200);
        }else{
          fb('일반 식수. 의미 없음.', false);
        }
      };
    });
  }

  if(p.type==='bedGrid'){
    let sel = null;
    overlay.querySelectorAll('.bed').forEach(b=>{
      b.onclick = ()=>{
        overlay.querySelectorAll('.bed').forEach(x=>x.classList.remove('selected'));
        b.classList.add('selected');
        sel = b.dataset.bed;
        document.getElementById('bed-sel').textContent = sel+'번 침대 선택됨';
      };
    });
    document.getElementById('puz-submit').onclick = ()=>{
      if(sel===p.answer){
        fb('매트리스 아래 — 봉인 봉투 발견.', true);
        setTimeout(()=>solvePuzzle(p, id, overlay), 1200);
      }else{
        if(sel==='46'){
          fb('46번 — 평범한 빈 침대. 노윤아의 말은 거짓이었다.', false);
          State.suspicion += 1;
        }else{
          fb('다른 사람의 침대다.', false);
        }
      }
    };
  }

  if(p.type==='textInput' || p.type==='memoAssembly'){
    const inp = document.getElementById('ti-input');
    inp.focus();
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
    const submit = ()=>{
      const v = inp.value.trim().toUpperCase();
      const ok = p.answer.some(a=>a.toUpperCase()===v);
      if(ok){
        fb('— 잠금 해제 —', true);
        setTimeout(()=>solvePuzzle(p, id, overlay), 1000);
      }else{
        fb('정답이 아니다.', false);
      }
    };
    document.getElementById('puz-submit').onclick = submit;
  }

  if(p.type==='radioDial'){
    let ch = 0;
    const disp = document.getElementById('radio-disp');
    const buzz = document.getElementById('radio-buzz');
    const buzzes = ['— 잡음 —','...즈즈... 정파 신호','..예배 방송 중...','...신도 일과...','...의료 채널...','...주방 통신...','...경비 무전...','...낯익은 목소리 — ?','...무음...','...구역 안내...','...치료실...','...관리...','...정파 신호'];
    overlay.querySelectorAll('.radio-controls button').forEach(b=>{
      b.onclick = ()=>{
        const d = parseInt(b.dataset.dir);
        ch = Math.max(0, Math.min(12, ch+d));
        disp.textContent = 'CH '+ch;
        buzz.textContent = buzzes[ch];
        if(ch===p.answer) buzz.style.color = 'var(--bone)';
        else buzz.style.color = '';
      };
    });
    document.getElementById('puz-submit').onclick = ()=>{
      if(ch===p.answer){
        fb('— 두 목소리. 노윤아와 — 교주. "B4 암호 변경. 광휘-2404." —', true);
        setTimeout(()=>solvePuzzle(p, id, overlay), 1800);
      }else{
        fb('이 채널이 아니다.', false);
      }
    };
  }

  if(p.type==='compass'){
    overlay.querySelectorAll('.compass-dir').forEach(d=>{
      d.onclick = ()=>{
        if(d.dataset.dir===p.answer){
          fb('— 새벽 공기. 지상이다. —', true);
          setTimeout(()=>solvePuzzle(p, id, overlay), 1200);
        }else{
          fb('막힌 통로다. 되돌아온다.', false);
          State.battery = Math.max(0, State.battery-3);
        }
      };
    });
  }
}

function solvePuzzle(p, id, overlay){
  if(p.onSolve) p.onSolve(State);
  overlay.remove();
  State.currentPuzzle=null;

  // After certain puzzles, advance the room
  if(id==='MQ1'){
    setTimeout(()=>tryAdvanceRoom(), 500);
  }
  if(id==='MQ2'){
    setTimeout(()=>tryAdvanceRoom(), 600);
  }
  if(id==='MQ3'){
    setTimeout(()=>tryAdvanceRoom(), 600);
  }
  if(id==='MQ4'){
    // MQ4 keeps player in B4; they need to find exit
    renderGame();
  }
  if(id==='MQ5'){
    // ending triggered inside onSolve
  }
  if(['SQ1','SQ2','SQ3'].includes(id)){
    renderGame();
  }
}

/* ===========================================================================
   PART I · TIMER + SAFETY
   =========================================================================== */

function startSelfDestructTimer(){
  State.flags.timerActive = true;
  State.flags.timerSeconds = 1200;
  if(State._tid) clearInterval(State._tid);
  State._tid = setInterval(()=>{
    if(!State.flags.timerActive){ clearInterval(State._tid); return; }
    State.flags.timerSeconds--;
    const t = document.querySelector('.hud-timer');
    if(t){
      const s = State.flags.timerSeconds;
      const m = Math.floor(s/60), ss = String(s%60).padStart(2,'0');
      t.textContent = '⚠ '+m+':'+ss;
    }
    if(State.flags.timerSeconds <= 0){
      State.flags.timerActive = false;
      clearInterval(State._tid);
      // forced END3
      forceEnding('END3');
    }
  },1000);
}

/* ===========================================================================
   PART J · HINTS / STATUS
   =========================================================================== */

async function requestHint(){
  // Determine current context — which puzzle is active or which clues are missing
  let target = State.currentPuzzle;
  if(!target){
    // Find the next unsolved main quest in this room
    const room = GAME_DATA.rooms[State.room];
    const mqHs = room.hotspots.find(h=>h.puzzle && h.puzzle.startsWith('MQ') && !State.mq.has(h.puzzle));
    if(mqHs) target = mqHs.puzzle;
  }
  if(!target){ flash('현재 도울 게 없어요.'); return; }

  if(State.battery < 10){ flash('배터리 부족 — 김재원과 교신 불가.'); return; }
  State.battery -= 10;

  const puz = GAME_DATA.puzzles[target];
  State.hintCount[target] = (State.hintCount[target]||0) + 1;
  let n = Math.min(State.hintCount[target], 3) - 1;

  // Try Gemini if available
  let hint = puz.hints[n];
  if(State.geminiKey){
    const dyn = await Gemini.generate(
      `당신은 편집장 김재원입니다. 무전기로 힌트를 전합니다. 정답은 절대 직접 말하지 마세요. 한국어, 40자 이내.`,
      `퍼즐: ${puz.name}. 힌트 수준 ${n+1}/3. 기본 힌트: "${puz.hints[n]}". 이를 자연스럽게 다시 써 주세요.`
    );
    if(dyn) hint = dyn;
  }

  flash(`김재원: "${hint}"`);
  renderGame();
}

function flash(text){
  const f = document.createElement('div');
  f.className = 'modal';
  f.innerHTML = `
    <div class="modal-box">
      <div style="font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.25em;margin-bottom:10px;">[ 무전 ]</div>
      <p style="font-family:var(--serif);font-size:16px;line-height:1.7;color:var(--ink);">${text}</p>
      <div class="modal-actions"><button class="ok" id="f-ok">확인</button></div>
    </div>
  `;
  document.body.appendChild(f);
  document.getElementById('f-ok').onclick = ()=>f.remove();
}

function showStatus(){
  const f = document.createElement('div');
  f.className = 'modal';
  f.innerHTML = `
    <div class="modal-box">
      <div style="font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.25em;margin-bottom:14px;">[ 상태 점검 ]</div>
      <div style="font-family:var(--mono);font-size:13px;line-height:2;color:var(--ink);">
        구역 ............ ${State.room}<br>
        배터리 .......... ${State.battery}%<br>
        진행 MQ ......... ${[...State.mq].join(', ')||'—'}<br>
        진행 SQ ......... ${[...State.sq].join(', ')||'—'}<br>
        의심 수치 ....... ${'●'.repeat(State.suspicion)}${'○'.repeat(5-State.suspicion)}<br>
        ${State.flags.timerActive?'<br><span style="color:var(--blood-bright)">자폭 카운트다운 진행 중</span>':''}
      </div>
      <div class="modal-actions"><button class="ok" id="s-ok">확인</button></div>
    </div>
  `;
  document.body.appendChild(f);
  document.getElementById('s-ok').onclick = ()=>f.remove();
}

/* ===========================================================================
   PART K · ENDING LOGIC
   =========================================================================== */

function decideEnding(){
  const {trust, aggression, sq, flags} = State;
  // HIDDEN (highest priority for special path)
  if(flags.trustedNoYuna && trust<=0) return 'HIDDEN';
  // END1 — full exposure
  if(trust>=3 && sq.has('SQ1') && sq.has('SQ2') && sq.has('SQ3')) return 'END1';
  // END3 — cold scoop (aggression-dominant)
  if(aggression>=3) return 'END3';
  // END4 — silent escape (trusted NoYuna in MQ4)
  if(flags.trustedNoYunaInMQ4) return 'END4';
  // END2 — default wounded victory
  return 'END2';
}

function triggerEnding(){
  const id = decideEnding();
  forceEnding(id);
}

function forceEnding(id){
  if(State._tid) clearInterval(State._tid);
  State.flags.timerActive = false;
  const e = GAME_DATA.endings[id];
  State.screen='ending';
  clearRoot();
  const div = document.createElement('div');
  div.className = `ending ${id}`;
  div.innerHTML = `
    <div class="ending-id">${e.id}</div>
    <h1 class="ending-title">${e.title}</h1>
    <p class="ending-epilogue">${e.epilogue}</p>
    <div class="ending-actions">
      <button id="ending-restart">다시 잠입한다</button>
      <button id="ending-title">타이틀로</button>
    </div>
  `;
  root().appendChild(div);
  document.getElementById('ending-restart').onclick = ()=>resetGame(true);
  document.getElementById('ending-title').onclick = ()=>resetGame(false);
}

function resetGame(skipTitle){
  // Reset state
  State.screen='title';
  State.room=null;
  State.battery=100;
  State.trust=0;State.aggression=0;State.suspicion=0;
  State.inventory=[];
  State.mq=new Set();State.sq=new Set();State.clues=new Set();
  State.flags={jisuFound:false,serverAccessed:false,timerActive:false,timerSeconds:1200,
    trustedNoYuna:false,trustedNoYunaInMQ4:false,enteredB4Cold:false,B2unlocked:false};
  State.introIndex=0;State.currentDialogue=null;State.currentEvent=null;State.currentPuzzle=null;
  State.hintCount={};
  if(State._tid){clearInterval(State._tid);State._tid=null}
  if(skipTitle) startGame();
  else renderTitle();
}

/* ===========================================================================
   BOOT
   =========================================================================== */
renderTitle();

/* expose for debugging */
window.__rb = {State, GAME_DATA, triggerEnding, forceEnding};
</script>
